name: apply-completion-v2

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/apply-completion-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Locate and apply verified worktree
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import gzip
          import io
          import shutil
          import tarfile
          import tempfile
          from pathlib import Path

          root = Path.cwd()

          def safe_extract(tf: tarfile.TarFile, target: Path) -> None:
              base = target.resolve()
              for member in tf.getmembers():
                  destination = (target / member.name).resolve()
                  if destination != base and base not in destination.parents:
                      raise RuntimeError(f"Unsafe member: {member.name}")
              tf.extractall(target)

          extracted_root = None
          archive_path = None
          temp_dir = Path(tempfile.mkdtemp(prefix="demografia-completion-"))
          for candidate in sorted(root.rglob("*")):
              if not candidate.is_file() or ".git" in candidate.parts:
                  continue
              raw = candidate.read_bytes().strip()
              if len(raw) < 512:
                  continue
              try:
                  decoded = base64.b64decode(b"".join(raw.split()), validate=False)
              except Exception:
                  continue
              payloads = [decoded]
              if decoded[:2] == b"\x1f\x8b":
                  try:
                      payloads.insert(0, gzip.decompress(decoded))
                  except Exception:
                      pass
              for payload in payloads:
                  try:
                      with tarfile.open(fileobj=io.BytesIO(payload), mode="r:*") as archive:
                          safe_extract(archive, temp_dir)
                      archive_path = candidate
                      break
                  except Exception:
                      continue
              if archive_path is not None:
                  break

          if archive_path is None:
              raise RuntimeError("No base64 tar worktree found")

          candidates = [temp_dir, *[p for p in temp_dir.rglob("*") if p.is_dir()]]
          candidates.sort(key=lambda p: len(p.parts))
          for candidate in candidates:
              if (candidate / "pyproject.toml").is_file() and (candidate / "demografia").is_dir():
                  extracted_root = candidate
                  break
          if extracted_root is None:
              raise RuntimeError("No repository root inside worktree archive")

          for source in extracted_root.rglob("*"):
              relative = source.relative_to(extracted_root)
              if relative.parts and relative.parts[0] == ".git":
                  continue
              destination = root / relative
              if source.is_dir():
                  destination.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, destination)

          archive_path.unlink()
          shutil.rmtree(temp_dir)
          PY
      - name: Install and run all local checks
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          ruff check .
          python -m compileall -q demografia scripts
          pytest
      - name: Publish validated implementation
        run: |
          rm -f .github/workflows/apply-completion.yml .github/workflows/apply-completion-v2.yml
          git config user.name "Nazareno Lecis"
          git config user.email "nazarenolecis@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Complete demographic data pipeline and quality controls"
            git push origin HEAD:main
          fi
